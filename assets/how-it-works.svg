<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>

  <rect width="900" height="400" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" text-anchor="middle">How prompt-poetry works</text>

  <!-- Your prompt input -->
  <rect x="30" y="160" width="160" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="110" y="185" fill="#8b949e" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle">Your prompt</text>
  <text x="110" y="205" fill="#58a6ff" font-family="ui-monospace,monospace" font-size="13" text-anchor="middle">"Design X"</text>

  <!-- Arrow 1 -->
  <path d="M 195 190 L 225 190" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#30363d"/></marker></defs>

  <!-- Technique 1: persona -->
  <rect x="230" y="80" width="120" height="50" rx="8" fill="url(#blue)" opacity="0.2" stroke="#58a6ff" stroke-width="1"/>
  <text x="290" y="100" fill="#58a6ff" font-family="ui-monospace,monospace" font-size="12" text-anchor="middle" font-weight="bold">persona</text>
  <text x="290" y="118" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">"architect"</text>

  <!-- Technique 2: prime -->
  <rect x="230" y="160" width="120" height="50" rx="8" fill="url(#purple)" opacity="0.2" stroke="#bc8cff" stroke-width="1"/>
  <text x="290" y="180" fill="#bc8cff" font-family="ui-monospace,monospace" font-size="12" text-anchor="middle" font-weight="bold">prime</text>
  <text x="290" y="198" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">"precision"</text>

  <!-- Technique 3: constrain -->
  <rect x="230" y="240" width="120" height="50" rx="8" fill="url(#pink)" opacity="0.2" stroke="#f778ba" stroke-width="1"/>
  <text x="290" y="260" fill="#f778ba" font-family="ui-monospace,monospace" font-size="12" text-anchor="middle" font-weight="bold">constrain</text>
  <text x="290" y="278" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">"under 200 words"</text>

  <!-- Pipe operators -->
  <text x="290" y="148" fill="#484f58" font-family="ui-monospace,monospace" font-size="18" text-anchor="middle">|</text>
  <text x="290" y="230" fill="#484f58" font-family="ui-monospace,monospace" font-size="18" text-anchor="middle">|</text>

  <!-- Bracket connecting techniques -->
  <path d="M 355 105 Q 380 105 380 190 Q 380 265 355 265" stroke="#30363d" stroke-width="1.5" fill="none"/>

  <!-- Arrow to pipeline -->
  <path d="M 385 190 L 415 190" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pipeline box -->
  <rect x="420" y="140" width="160" height="80" rx="10" fill="#161b22" stroke="url(#accent2)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
  <defs>
    <linearGradient id="accent2b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
  </defs>
  <text x="500" y="172" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="14" text-anchor="middle" font-weight="bold">Pipeline</text>
  <text x="500" y="200" fill="#8b949e" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">left → right execution</text>

  <!-- Arrow to output -->
  <path d="M 585 190 L 615 190" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Enhanced output -->
  <rect x="620" y="100" width="250" height="180" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="745" y="128" fill="#3fb950" font-family="ui-monospace,monospace" font-size="12" text-anchor="middle" font-weight="bold">Enhanced prompt</text>
  <line x1="635" y1="140" x2="855" y2="140" stroke="#21262d" stroke-width="1"/>
  <text x="640" y="162" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9">Be meticulous and exact...</text>
  <text x="640" y="180" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9"> </text>
  <text x="640" y="198" fill="#58a6ff" font-family="ui-monospace,monospace" font-size="9">You are a architect.</text>
  <text x="640" y="216" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9"> </text>
  <text x="640" y="234" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="9">Design X</text>
  <text x="640" y="252" fill="#8b949e" font-family="ui-monospace,monospace" font-size="9"> </text>
  <text x="640" y="270" fill="#f778ba" font-family="ui-monospace,monospace" font-size="9">Constraints: under 200 words</text>

  <!-- Bottom: "Send to any LLM" -->
  <path d="M 745 285 L 745 330" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM targets -->
  <rect x="620" y="335" width="70" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="655" y="357" fill="#8b949e" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">OpenAI</text>

  <rect x="700" y="335" width="80" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="740" y="357" fill="#8b949e" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">Anthropic</text>

  <rect x="790" y="335" width="70" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="825" y="357" fill="#8b949e" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">Ollama</text>
</svg>
