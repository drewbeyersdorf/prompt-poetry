<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg2)"/>

  <!-- Grid -->
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid2)" opacity="0.4"/>

  <!-- Title -->
  <text x="640" y="200" fill="url(#accent2)" font-family="ui-monospace,monospace" font-size="72" font-weight="bold" text-anchor="middle" letter-spacing="-2">prompt-poetry</text>

  <!-- Tagline -->
  <text x="640" y="270" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">The best prompt engineers aren't engineers</text>
  <text x="640" y="310" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">— they're poets.</text>

  <!-- Code snippet -->
  <rect x="290" y="360" width="700" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="320" y="400" fill="#ff7b72" font-family="ui-monospace,monospace" font-size="18">from</text>
  <text x="365" y="400" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="18"> prompt_poetry </text>
  <text x="557" y="400" fill="#ff7b72" font-family="ui-monospace,monospace" font-size="18">import</text>
  <text x="620" y="400" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="18"> persona, prime, constrain</text>

  <text x="320" y="440" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="18">enhanced = persona(</text>
  <text x="535" y="440" fill="#a5d6ff" font-family="ui-monospace,monospace" font-size="18">"architect"</text>
  <text x="657" y="440" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="18">) </text>
  <text x="675" y="440" fill="#bc8cff" font-family="ui-monospace,monospace" font-size="18">|</text>
  <text x="690" y="440" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="18"> prime(</text>
  <text x="755" y="440" fill="#a5d6ff" font-family="ui-monospace,monospace" font-size="18">"precision"</text>
  <text x="877" y="440" fill="#c9d1d9" font-family="ui-monospace,monospace" font-size="18">)</text>

  <!-- Bottom line -->
  <text x="640" y="550" fill="#484f58" font-family="ui-monospace,monospace" font-size="16" text-anchor="middle">8 techniques · zero dependencies · one pipe operator · any LLM</text>

  <!-- Author -->
  <text x="640" y="600" fill="#30363d" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">github.com/drewbeyersdorf/prompt-poetry</text>
</svg>
